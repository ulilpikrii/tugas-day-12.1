<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7C29;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A6B1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C9A36;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="180" cy="70" rx="50" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="100" rx="70" ry="30" fill="white" opacity="0.6"/>
  <ellipse cx="640" cy="90" rx="50" ry="20" fill="white" opacity="0.6"/>
  <!-- Sun -->
  <circle cx="680" cy="60" r="40" fill="#FFD700" opacity="0.9"/>
  <!-- Mountains back -->
  <polygon points="0,350 150,180 300,350" fill="url(#mountain1)" opacity="0.7"/>
  <polygon points="200,350 400,150 600,350" fill="url(#mountain1)" opacity="0.8"/>
  <polygon points="500,350 700,200 800,350" fill="url(#mountain1)" opacity="0.7"/>
  <!-- Mountains front -->
  <polygon points="0,400 200,250 400,400" fill="url(#mountain2)"/>
  <polygon points="300,400 500,220 700,400" fill="url(#mountain2)"/>
  <polygon points="550,400 750,280 800,400" fill="url(#mountain2)"/>
  <!-- Green valley -->
  <rect x="0" y="380" width="800" height="120" fill="#5C9A36"/>
  <ellipse cx="400" cy="380" rx="500" ry="40" fill="#4A7C29"/>
  <!-- Paraglider canopy -->
  <path d="M350,120 Q400,60 450,120" fill="#FF4444" stroke="#CC0000" stroke-width="2"/>
  <path d="M355,120 Q400,70 445,120" fill="#FF6666" opacity="0.5"/>
  <!-- Lines -->
  <line x1="360" y1="120" x2="395" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="120" x2="405" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="380" y1="115" x2="398" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="420" y1="115" x2="402" y2="180" stroke="#333" stroke-width="1"/>
  <!-- Person -->
  <circle cx="400" cy="188" r="8" fill="#FFB366"/>
  <rect x="393" y="196" width="14" height="20" rx="3" fill="#2196F3"/>
  <line x1="397" y1="216" x2="393" y2="235" stroke="#333" stroke-width="2"/>
  <line x1="403" y1="216" x2="407" y2="235" stroke="#333" stroke-width="2"/>
  <!-- Rice terraces -->
  <path d="M50,420 Q200,400 350,430 Q500,445 650,420 Q750,410 800,425" fill="none" stroke="#3A6B1E" stroke-width="1" opacity="0.5"/>
  <path d="M0,440 Q150,425 300,445 Q450,460 600,440 Q700,430 800,445" fill="none" stroke="#3A6B1E" stroke-width="1" opacity="0.5"/>
  <!-- Trees -->
  <polygon points="100,380 110,340 120,380" fill="#2D5016"/>
  <polygon points="700,385 710,345 720,385" fill="#2D5016"/>
  <polygon points="250,390 260,355 270,390" fill="#2D5016"/>
</svg>
