<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="wsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wmtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#wsky)"/>
  <!-- Sun -->
  <circle cx="650" cy="80" r="50" fill="#FFD54F" opacity="0.9"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="70" rx="80" ry="30" fill="white" opacity="0.8"/>
  <ellipse cx="240" cy="60" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="550" cy="110" rx="70" ry="25" fill="white" opacity="0.6"/>
  <!-- Mountains -->
  <polygon points="0,320 200,120 400,320" fill="url(#wmtn)" opacity="0.6"/>
  <polygon points="150,320 400,100 650,320" fill="url(#wmtn)" opacity="0.8"/>
  <polygon points="450,320 650,160 800,320" fill="url(#wmtn)" opacity="0.7"/>
  <!-- Arjuno mountain peak with snow -->
  <polygon points="300,320 450,80 600,320" fill="#2E7D32"/>
  <polygon points="400,120 450,80 500,120" fill="white" opacity="0.4"/>
  <!-- Green valley -->
  <rect x="0" y="320" width="800" height="180" fill="#66BB6A"/>
  <!-- Rice terraces -->
  <path d="M0,360 Q200,340 400,365 Q600,385 800,360" fill="#4CAF50" opacity="0.7"/>
  <path d="M0,390 Q200,370 400,395 Q600,410 800,390" fill="#43A047" opacity="0.6"/>
  <path d="M0,420 Q200,400 400,425 Q600,440 800,420" fill="#388E3C" opacity="0.5"/>
  <!-- Apple trees (Batu is famous for apples) -->
  <circle cx="150" cy="340" r="25" fill="#2E7D32"/>
  <rect x="147" y="360" width="6" height="20" fill="#5D4037"/>
  <circle cx="140" cy="335" r="4" fill="#F44336"/>
  <circle cx="160" cy="340" r="4" fill="#F44336"/>
  <circle cx="148" cy="330" r="4" fill="#F44336"/>
  <circle cx="650" cy="345" r="25" fill="#2E7D32"/>
  <rect x="647" y="365" width="6" height="20" fill="#5D4037"/>
  <circle cx="640" cy="340" r="4" fill="#F44336"/>
  <circle cx="660" cy="345" r="4" fill="#F44336"/>
  <!-- Small houses -->
  <rect x="300" y="370" width="40" height="30" fill="#FFCC80"/>
  <polygon points="295,370 320,345 345,370" fill="#D84315"/>
  <rect x="310" y="385" width="10" height="15" fill="#5D4037"/>
  <rect x="500" y="375" width="35" height="25" fill="#FFCC80"/>
  <polygon points="495,375 517,355 540,375" fill="#D84315"/>
  <!-- Path/road -->
  <path d="M400,500 Q380,430 400,380 Q420,340 450,320" fill="none" stroke="#8D6E63" stroke-width="8" opacity="0.6"/>
  <!-- Hot air balloon -->
  <ellipse cx="100" cy="160" rx="30" ry="40" fill="#FF5722"/>
  <rect x="90" y="200" width="20" height="15" rx="3" fill="#795548"/>
  <line x1="90" y1="200" x2="75" y2="160" stroke="#333" stroke-width="1"/>
  <line x1="110" y1="200" x2="125" y2="160" stroke="#333" stroke-width="1"/>
  <!-- Welcome text -->
  <rect x="220" y="440" width="360" height="45" rx="10" fill="#1B5E20" opacity="0.85"/>
  <text x="400" y="470" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="white" text-anchor="middle">WISATA BATU MALANG</text>
</svg>
