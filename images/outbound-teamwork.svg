<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Ground -->
  <ellipse cx="400" cy="420" rx="350" ry="60" fill="#81C784" opacity="0.5"/>
  <!-- Person 1 -->
  <circle cx="200" cy="250" r="25" fill="#FFB74D"/>
  <rect x="180" y="278" width="40" height="60" rx="8" fill="#1565C0"/>
  <rect x="175" y="280" width="15" height="50" rx="5" fill="#1565C0" transform="rotate(-30 183 280)"/>
  <rect x="210" y="280" width="15" height="50" rx="5" fill="#1565C0" transform="rotate(30 217 280)"/>
  <rect x="185" y="338" width="12" height="50" rx="4" fill="#37474F"/>
  <rect x="203" y="338" width="12" height="50" rx="4" fill="#37474F"/>
  <!-- Person 2 -->
  <circle cx="350" cy="240" r="25" fill="#FFCC80"/>
  <rect x="330" y="268" width="40" height="60" rx="8" fill="#C62828"/>
  <rect x="325" y="270" width="15" height="50" rx="5" fill="#C62828" transform="rotate(-20 333 270)"/>
  <rect x="360" y="270" width="15" height="50" rx="5" fill="#C62828" transform="rotate(20 367 270)"/>
  <rect x="335" y="328" width="12" height="50" rx="4" fill="#37474F"/>
  <rect x="353" y="328" width="12" height="50" rx="4" fill="#37474F"/>
  <!-- Person 3 -->
  <circle cx="500" cy="245" r="25" fill="#FFB74D"/>
  <rect x="480" y="273" width="40" height="60" rx="8" fill="#2E7D32"/>
  <rect x="475" y="275" width="15" height="50" rx="5" fill="#2E7D32" transform="rotate(-25 483 275)"/>
  <rect x="510" y="275" width="15" height="50" rx="5" fill="#2E7D32" transform="rotate(25 517 275)"/>
  <rect x="485" y="333" width="12" height="50" rx="4" fill="#37474F"/>
  <rect x="503" y="333" width="12" height="50" rx="4" fill="#37474F"/>
  <!-- Person 4 -->
  <circle cx="630" cy="255" r="25" fill="#FFCC80"/>
  <rect x="610" y="283" width="40" height="60" rx="8" fill="#F57F17"/>
  <rect x="605" y="285" width="15" height="50" rx="5" fill="#F57F17" transform="rotate(-15 613 285)"/>
  <rect x="640" y="285" width="15" height="50" rx="5" fill="#F57F17" transform="rotate(15 647 285)"/>
  <rect x="615" y="343" width="12" height="50" rx="4" fill="#37474F"/>
  <rect x="633" y="343" width="12" height="50" rx="4" fill="#37474F"/>
  <!-- Connection lines (teamwork) -->
  <line x1="220" y1="300" x2="330" y2="290" stroke="#FFC107" stroke-width="4" stroke-dasharray="8,4"/>
  <line x1="370" y1="290" x2="480" y2="295" stroke="#FFC107" stroke-width="4" stroke-dasharray="8,4"/>
  <line x1="520" y1="295" x2="610" y2="305" stroke="#FFC107" stroke-width="4" stroke-dasharray="8,4"/>
  <!-- Stars / sparkles -->
  <text x="280" y="220" font-size="24" fill="#FFC107">✨</text>
  <text x="430" y="210" font-size="24" fill="#FFC107">⭐</text>
  <text x="560" y="225" font-size="24" fill="#FFC107">✨</text>
  <!-- Title banner -->
  <rect x="200" y="40" width="400" height="60" rx="10" fill="#1B5E20" opacity="0.9"/>
  <text x="400" y="78" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="white" text-anchor="middle">OUTBOUND TEAMWORK</text>
  <!-- Trees -->
  <polygon points="50,400 65,320 80,400" fill="#2E7D32"/>
  <rect x="60" y="400" width="10" height="30" fill="#5D4037"/>
  <polygon points="720,390 735,310 750,390" fill="#2E7D32"/>
  <rect x="730" y="390" width="10" height="30" fill="#5D4037"/>
</svg>
